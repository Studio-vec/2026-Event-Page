<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>WKF 2026</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f4f4;
      --border: #e8e8e8;
      --primary: #dc2626;
      --primary-dark: #991b1b;
      --accent: #fef08a;
      --text: #111111;
      --text-2: #666666;
      --text-3: #aaaaaa;
      --r: 18px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { min-height:100%; background:var(--bg); font-family:-apple-system,sans-serif; color:var(--text); }

    .page { max-width:480px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; padding:0 24px; }

    header {
      padding-top:max(env(safe-area-inset-top,0px),20px);
      padding-bottom:20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-mark {
      width:36px; height:36px; border-radius:10px;
      background:transparent; display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .logo-mark img { width:100%; height:100%; object-fit:contain; display:block; }
    .logo-text { line-height:1.3; }
    .logo-top { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-3); }
    .logo-bot { font-size:11px; font-weight:800; color:var(--text); }
    .year-tag {
      font-size:12px; font-weight:800; color:var(--primary);
      border:1.5px solid var(--primary); padding:4px 10px; border-radius:20px;
    }

    main { flex:1; display:flex; flex-direction:column; justify-content:center; gap:36px; padding:8px 0 24px; }

    .accent-bar { width:44px; height:4px; background:var(--accent); border-radius:2px; margin-bottom:14px; }
    .hero-title { font-size:36px; font-weight:800; line-height:1.15; letter-spacing:-.03em; }
    .hero-title .accent { color:var(--primary); }
    .hero-sub { font-size:13px; color:var(--text-2); margin-top:10px; line-height:1.6; }

    .cta-list { display:flex; flex-direction:column; gap:12px; }
    .cta-row { display:flex; gap:12px; }
    .cta-row .cta { flex:1; }
    .cta {
      display:flex; align-items:center; gap:16px;
      padding:18px 20px; border-radius:var(--r);
      text-decoration:none; color:var(--text);
      background:var(--surface);
      transition:background .18s, color .18s, transform .1s;
    }
    .cta:hover { background:var(--primary); color:#fff; }
    .cta:active { background:var(--primary); color:#fff; transform:scale(.98); }
    .cta-hero {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; padding:32px 20px; border-radius:var(--r);
      text-decoration:none; color:#fff;
      background:var(--primary);
      transition:opacity .18s, transform .1s;
    }
    .cta-hero:active { opacity:.85; transform:scale(.98); }
    .cta-hero .cta-icon {
      width:56px; height:56px; border-radius:16px;
      background:rgba(255,255,255,.2); font-size:28px;
    }
    .cta-hero .cta-label { font-size:20px; font-weight:800; color:#fff; }
    .cta-hero .cta-hint { font-size:13px; opacity:.75; color:#fff; }
    .cta-icon {
      width:44px; height:44px; border-radius:12px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:20px;
      background:rgba(220,38,38,.08);
      transition:background .18s;
    }
    .cta:hover .cta-icon, .cta:active .cta-icon { background:rgba(255,255,255,.18); }
    .cta-body { flex:1; }
    .cta-label { font-size:15px; font-weight:700; margin-bottom:2px; }
    .cta-hint { font-size:11px; opacity:.6; }
    .cta-arrow { font-size:18px; opacity:.4; flex-shrink:0; }
    .cta-row .cta { flex-direction:column; align-items:center; text-align:center; padding:20px 12px; gap:10px; }
    .cta-row .cta-arrow { display:none; }
    .cta-row .cta-body { flex:none; }

    footer {
      padding:16px 0 max(env(safe-area-inset-bottom,0px),20px);
      border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .footer-date { font-size:13px; font-weight:700; }
    .footer-place { font-size:11px; color:var(--text-3); margin-top:2px; }
    .footer-wkf { font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--text-3); text-align:right; line-height:1.5; }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">
      <div class="logo-mark"><img src="WKF_logo.png" alt="WKF"></div>
      <div class="logo-text">
        <div class="logo-top">World Knowledge Forum</div>
        <div class="logo-bot">The Promethean Moment</div>
      </div>
    </div>
    <div class="year-tag">2026</div>
  </header>

  <main>
    <div>
      <div class="accent-bar"></div>
      <h1 class="hero-title">프로메테우스의<br><span class="accent">불꽃</span>을<br>경험하세요</h1>
      <p class="hero-sub">Architecting the Co-Intelligence Order</p>
    </div>

    <div class="cta-list">
      <a href="info.html" class="cta-hero">
        <div class="cta-icon">🎁</div>
        <div class="cta-label">현장 이벤트 안내</div>
        <div class="cta-hint">경품 · 응모 방법 · 웰컴키트</div>
      </a>

      <div class="cta-row">
        <a href="ar.html" class="cta">
          <div class="cta-icon">📷</div>
          <div class="cta-body">
            <div class="cta-label">세션장별 불꽃</div>
            <div class="cta-hint">AR 카메라 인식</div>
          </div>
          <div class="cta-arrow">›</div>
        </a>

        <a href="quiz.html" class="cta">
          <div class="cta-icon">🔥</div>
          <div class="cta-body">
            <div class="cta-label">나의 불꽃 유형</div>
            <div class="cta-hint">AI 유형 테스트</div>
          </div>
          <div class="cta-arrow">›</div>
        </a>
      </div>
    </div>
  </main>

  <footer>
    <div>
      <div class="footer-date">2026. 09. 08 – 09. 10</div>
      <div class="footer-place">📍 서울 신라호텔</div>
    </div>
    <div class="footer-wkf">WORLD<br>KNOWLEDGE<br>FORUM</div>
  </footer>
</div>
</body>
</html>
