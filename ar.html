<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>AR 불꽃 | WKF 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-master.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    :root {
      --bg:#ffffff; --surface:#f4f4f4; --border:#e8e8e8;
      --primary:#dc2626; --text:#111111; --text-2:#666666; --text-3:#aaaaaa; --r:16px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;font-family:-apple-system,sans-serif;color:var(--text);background:var(--bg);}

    /* 세션장 선택 화면 */
    #hallScreen{
      position:fixed;inset:0;display:flex;flex-direction:column;
      background:var(--bg);z-index:30;overflow-y:auto;
    }
    #hallScreen.hidden{display:none;}

    .top-bar{
      display:flex;align-items:center;gap:12px;
      padding:max(env(safe-area-inset-top,0px),16px) 20px 16px;
      flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);
    }
    .back{
      width:38px;height:38px;border-radius:10px;background:var(--surface);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;color:var(--text-2);text-decoration:none;transition:opacity .12s;flex-shrink:0;
    }
    .back:active{opacity:.6;}
    .bar-title{flex:1;font-size:14px;font-weight:700;}
    .hall-content{padding:20px 20px max(env(safe-area-inset-bottom,0px),90px);max-width:480px;margin:0 auto;width:100%;}
    .section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);margin-bottom:6px;}
    .section-title{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:6px;}
    .section-sub{font-size:13px;color:var(--text-2);margin-top:6px;line-height:1.6;margin-bottom:20px;}
    .hall-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
    .hall-card{
      display:flex;flex-direction:column;justify-content:flex-end;
      padding:18px 16px;border-radius:var(--r);aspect-ratio:1/1;
      background:var(--surface);cursor:pointer;transition:opacity .12s,transform .1s;
      position:relative;overflow:hidden;
    }
    .hall-card:active{opacity:.7;transform:scale(.97);}
    .hall-card-num{position:absolute;top:14px;right:14px;font-size:11px;font-weight:800;color:var(--text-3);}
    .hall-marker-thumb{position:absolute;top:12px;left:12px;width:36px;height:36px;object-fit:contain;opacity:.5;}
    .hall-name{font-size:14px;font-weight:800;line-height:1.2;margin-bottom:2px;}
    .hall-en{font-size:10px;color:var(--text-3);font-weight:500;}
    .guide-card{margin-top:12px;padding:16px;border-radius:var(--r);background:var(--surface);}
    .guide-title{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:10px;letter-spacing:.05em;text-transform:uppercase;}
    .guide-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:12px;color:var(--text-2);line-height:1.5;}
    .guide-step:last-child{margin-bottom:0;}
    .gnum{width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .home-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
      border-top:1px solid var(--border);
      padding:12px 20px max(env(safe-area-inset-bottom,0px),12px);
      display:flex;justify-content:center;z-index:200;
    }
    .home-btn{
      display:flex;align-items:center;gap:8px;padding:11px 28px;border-radius:50px;
      background:var(--surface);color:var(--text-2);font-size:13px;font-weight:700;text-decoration:none;
    }

    /* MindAR video: body에 직접, 카메라 배경 */
    #arVideo{
      display:none;
      position:fixed;top:0;left:0;
      width:100vw;height:100vh;
      object-fit:cover;
      z-index:10;
    }
    #arVideo.active{display:block;}

    /* 불꽃 2D canvas 오버레이 */
    #flameOverlay{
      display:none;
      position:fixed;inset:0;
      z-index:12;
      pointer-events:none;
    }
    #flameOverlay.active{display:block;}

    /* 카메라 UI 오버레이 */
    #camOverlay{
      position:fixed;inset:0;z-index:20;
      display:none;flex-direction:column;
      pointer-events:none;
    }
    #camOverlay.active{display:flex;}
    .cam-top{
      display:flex;align-items:center;justify-content:space-between;
      padding:max(env(safe-area-inset-top,0px),16px) 20px 16px;
      background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);
      pointer-events:all;
    }
    .cam-back{
      width:40px;height:40px;border-radius:12px;
      background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;color:#fff;cursor:pointer;
    }
    .hall-pill{
      padding:7px 16px;border-radius:20px;
      background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.2);
      font-size:13px;font-weight:700;color:#fff;
    }
    .cam-middle{flex:1;display:flex;align-items:center;justify-content:center;}
    .scan-hint{
      padding:10px 20px;border-radius:20px;
      background:rgba(0,0,0,.45);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.15);
      font-size:12px;color:rgba(255,255,255,.75);
      opacity:1;transition:opacity .3s;
    }
    .scan-hint.hidden{opacity:0;}
    .cam-bottom{
      padding:14px 20px;padding-bottom:max(env(safe-area-inset-bottom,0px),14px);
      display:flex;align-items:center;gap:12px;
      background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
      pointer-events:all;
    }
    .status-pill{
      display:flex;align-items:center;gap:8px;
      padding:10px 18px;border-radius:50px;
      background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.15);
      font-size:13px;font-weight:600;color:rgba(255,255,255,.85);
      transition:all .3s;
    }
    .status-pill.found{background:rgba(220,38,38,.75);border-color:rgba(255,100,100,.4);color:#fff;}
    .status-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);animation:blink 1.4s infinite;}
    .status-pill.found .status-dot{background:#fff;animation:none;}
    @keyframes blink{0%,100%{opacity:.3;}50%{opacity:1;}}
    .marker-hint{display:flex;align-items:center;gap:10px;margin-left:auto;}
    .marker-hint-img{width:36px;height:36px;object-fit:contain;filter:brightness(0) invert(1);opacity:.55;}
    .marker-hint-txt{font-size:11px;color:rgba(255,255,255,.5);line-height:1.4;}
    .marker-hint-txt strong{display:block;color:rgba(255,255,255,.75);font-size:12px;}

    /* A-Frame scene: 숨겨서 감지 전용으로만 사용 */
    #arScene{
      position:fixed !important;
      top:0 !important;left:0 !important;
      width:1px !important;height:1px !important;
      opacity:0 !important;
      pointer-events:none !important;
      z-index:1 !important;
    }

    /* 인앱 경고 */
    #inappWarn{
      display:none;position:fixed;inset:0;z-index:999;background:var(--bg);
      flex-direction:column;align-items:center;justify-content:center;
      padding:40px 28px;text-align:center;gap:16px;
    }
    #inappWarn.on{display:flex;}
    .warn-icon{font-size:52px;}
    .warn-title{font-size:22px;font-weight:800;}
    .warn-desc{font-size:13px;color:var(--text-2);line-height:1.7;}
    #warnUrl{width:100%;max-width:320px;padding:14px 16px;border-radius:12px;background:var(--surface);font-size:12px;color:var(--text-2);word-break:break-all;line-height:1.5;text-align:left;}
    .warn-btn{width:100%;max-width:320px;padding:18px;border-radius:var(--r);border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>

<!-- 세션장 선택 화면 -->
<div id="hallScreen">
  <div class="top-bar" style="max-width:480px;margin:0 auto;width:100%">
    <a href="index.html" class="back">‹</a>
    <div class="bar-title">세션장별 불꽃 확인</div>
  </div>
  <div class="hall-content">
    <div class="section-label">📷 AR 카메라</div>
    <div class="section-title">어느 세션장에<br>계신가요?</div>
    <div class="section-sub">세션장을 선택하고 횃불 마커에 카메라를 비추면<br>그 공간만의 불꽃이 나타납니다.</div>
    <div class="guide-card">
      <div class="guide-title">이용 방법</div>
      <div class="guide-step"><div class="gnum">1</div><span>현재 세션장을 아래에서 선택하세요</span></div>
      <div class="guide-step"><div class="gnum">2</div><span>카메라를 허용하고 <strong>횃불 마커</strong>에 비추세요</span></div>
      <div class="guide-step"><div class="gnum">3</div><span>마커 위에 불꽃이 나타납니다 🔥</span></div>
    </div>
    <div class="hall-grid" id="hallGrid"></div>
  </div>
  <div class="home-bar"><a href="index.html" class="home-btn">← 메인 메뉴</a></div>
</div>

<!-- 카메라 영상 (MindAR video를 받아 표시) -->
<video id="arVideo" autoplay playsinline webkit-playsinline muted></video>

<!-- 불꽃 2D 오버레이 -->
<canvas id="flameOverlay"></canvas>

<!-- 카메라 UI 오버레이 -->
<div id="camOverlay">
  <div class="cam-top">
    <div class="cam-back" onclick="goHall()">‹</div>
    <div class="hall-pill"><span id="pillName"></span></div>
    <div style="width:40px"></div>
  </div>
  <div class="cam-middle">
    <div class="scan-hint" id="scanHint">📍 횃불 마커를 화면 중앙에 비춰주세요</div>
  </div>
  <div class="cam-bottom">
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusTxt">마커를 찾는 중...</span>
    </div>
    <div class="marker-hint">
      <img class="marker-hint-img" id="markerHintImg" src="" alt="">
      <div class="marker-hint-txt"><strong>찾을 마커</strong>비추세요</div>
    </div>
  </div>
</div>

<!-- A-Frame scene (화면에 보이지 않음, 감지 전용) -->
<a-scene id="arScene" embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"></a-scene>

<!-- 인앱 경고 -->
<div id="inappWarn">
  <div class="warn-icon">📵</div>
  <div class="warn-title">다른 브라우저로<br>열어주세요</div>
  <div class="warn-desc">카카오톡 인앱 브라우저에서는 카메라 권한이 제한됩니다.<br><br>아래 주소를 <strong>Chrome</strong> 또는 <strong>기본 브라우저</strong>에서 열어주세요.</div>
  <div id="warnUrl"></div>
  <button class="warn-btn" onclick="copyUrl()">🔗 주소 복사</button>
</div>

<script>
/* ── 세션장 데이터 ── */
const HALLS = {
  'dynasty-a': { name:'다이너스티 A', en:'Dynasty Hall A', mindFile:'marker-1.mind', markerImg:'image/marker-1.png', flameKey:'gold' },
  'dynasty-b': { name:'다이너스티 B', en:'Dynasty Hall B', mindFile:'marker-2.mind', markerImg:'image/marker-2.png', flameKey:'purple' },
  'ruby':      { name:'루비',         en:'Ruby Hall',      mindFile:'marker-3.mind', markerImg:'image/marker-3.png', flameKey:'fire' },
  'topaz':     { name:'토파즈',       en:'Topaz Hall',     mindFile:'marker-4.mind', markerImg:'image/marker-4.png', flameKey:'blue' },
  'emerald':   { name:'에메랄드',     en:'Emerald Hall',   mindFile:'marker-5.mind', markerImg:'image/marker-5.png', flameKey:'green' },
};

const BAR_PARAMS = [
  {h:30,dur:1.1, del:0,    sy1:0.68,sy2:1.06},
  {h:50,dur:0.92,del:0.2,  sy1:0.75,sy2:1.00},
  {h:57,dur:1.28,del:0.08, sy1:0.62,sy2:0.96},
  {h:65,dur:0.98,del:0.04, sy1:0.70,sy2:1.05},
  {h:55,dur:1.18,del:0.25, sy1:0.65,sy2:0.97},
  {h:47,dur:0.85,del:0.14, sy1:0.80,sy2:1.10},
  {h:37,dur:1.05,del:0.31, sy1:0.72,sy2:1.02},
];
const FLAME_COLS = {
  fire:   ['#7f1d1d','#dc2626','#f97316','#fef08a'],
  gold:   ['#92400e','#d97706','#fbbf24','#fef9c3'],
  purple: ['#3b0764','#7c3aed','#a855f7','#e9d5ff'],
  blue:   ['#0c4a6e','#0284c7','#38bdf8','#e0f2fe'],
  green:  ['#14532d','#15803d','#16a34a','#dcfce7'],
};

function drawFlameFrame(ctx, W, H, stops, t) {
  ctx.clearRect(0, 0, W, H);
  const barW = W / BAR_PARAMS.length;
  const grad = ctx.createLinearGradient(0, H, 0, 0);
  stops.forEach((c, i) => grad.addColorStop(i / (stops.length - 1), c));
  BAR_PARAMS.forEach((p, i) => {
    const phase = ((t / 1000 - p.del) / p.dur) % 2;
    const t01 = phase < 1 ? phase : 2 - phase;
    const scale = p.sy1 + (p.sy2 - p.sy1) * t01;
    const bh = p.h * (H / 65) * scale;
    ctx.fillStyle = grad;
    ctx.fillRect(i * barW + 1, H - bh, barW - 2, bh);
  });
  const glow = ctx.createRadialGradient(W/2, H*.7, 0, W/2, H*.7, W*.55);
  glow.addColorStop(0, stops[Math.floor(stops.length/2)] + '88');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'source-over';
}

/* ── A-Frame 컴포넌트 (감지용, 렌더링은 별도) ── */
AFRAME.registerComponent('flame-canvas', {
  schema: { hallId: {type:'string', default:''} },
  init() {},
  tick() {}
});

/* ── 세션장 카드 렌더 ── */
const grid = document.getElementById('hallGrid');
Object.entries(HALLS).forEach(([id, h], idx) => {
  const card = document.createElement('div');
  card.className = 'hall-card';
  card.onclick = () => selectHall(id);
  card.innerHTML = `
    <div class="hall-card-num">${String(idx+1).padStart(2,'0')}</div>
    <img class="hall-marker-thumb" src="${h.markerImg}" alt="">
    <div><div class="hall-name">${h.name}</div><div class="hall-en">${h.en}</div></div>`;
  grid.appendChild(card);
});

/* ── 상태 ── */
let curHall = null;
let flameRafId = null;
let arSceneEl = null;

function isInApp() {
  return /KAKAOTALK|NAVER|Instagram|FB_IAB|FBAN|Line|FBAV/i.test(navigator.userAgent);
}
function copyUrl() {
  navigator.clipboard?.writeText(location.href)
    .then(() => alert('주소가 복사되었습니다!\nChrome 또는 기본 브라우저에 붙여넣기 해주세요.'))
    .catch(() => prompt('아래 주소를 복사하세요', location.href));
}

function setStatus(found) {
  document.getElementById('statusPill').classList.toggle('found', found);
  document.getElementById('statusTxt').textContent = found ? '🔥 불꽃 인식됨!' : '마커를 찾는 중...';
  document.getElementById('scanHint').classList.toggle('hidden', found);
  if (found) showFlame2D(); else hideFlame2D();
}

/* ── 2D 불꽃 오버레이 ── */
function showFlame2D() {
  const fc = document.getElementById('flameOverlay');
  fc.width = window.innerWidth;
  fc.height = window.innerHeight;
  fc.classList.add('active');

  const ctx = fc.getContext('2d');
  const h = HALLS[curHall];
  const stops = FLAME_COLS[h ? h.flameKey : 'fire'] || FLAME_COLS.fire;

  // 화면 하단 중앙에 불꽃 표시
  const FW = Math.min(fc.width * 0.55, 280);
  const FH = FW * 1.2;
  const fx = (fc.width - FW) / 2;
  const fy = fc.height - FH - 80;

  cancelAnimationFrame(flameRafId);
  function animate() {
    ctx.clearRect(0, 0, fc.width, fc.height);

    // 핸들 힌트 배경
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(fx - 16, fy - 16, FW + 32, FH + 32, 20);
    ctx.fill();
    ctx.restore();

    // 불꽃 그리기 (서브 캔버스)
    const tmp = document.createElement('canvas');
    tmp.width = FW; tmp.height = FH;
    drawFlameFrame(tmp.getContext('2d'), FW, FH, stops, performance.now());
    ctx.drawImage(tmp, fx, fy, FW, FH);

    flameRafId = requestAnimationFrame(animate);
  }
  animate();
}

function hideFlame2D() {
  cancelAnimationFrame(flameRafId);
  flameRafId = null;
  const fc = document.getElementById('flameOverlay');
  fc.classList.remove('active');
}

/* ── AR 시작 ── */
function selectHall(id) {
  curHall = id;
  if (isInApp()) {
    document.getElementById('warnUrl').textContent = location.href;
    document.getElementById('inappWarn').classList.add('on');
    return;
  }
  const h = HALLS[id];
  document.getElementById('pillName').textContent = h.name;
  document.getElementById('markerHintImg').src = h.markerImg;
  setStatus(false);
  startAR(id, h.mindFile);
}

function startAR(hallId, mindFile) {
  stopAR();
  document.getElementById('hallScreen').classList.add('hidden');
  document.getElementById('camOverlay').classList.add('active');

  // 기존 a-scene 제거 후 재생성 (다른 마인드 파일로 전환)
  const old = document.getElementById('arScene');
  if (old) old.remove();

  const scene = document.createElement('a-scene');
  scene.id = 'arScene';
  scene.setAttribute('mindar-image', `imageTargetSrc: ${mindFile}; uiScanning: no; uiLoading: no`);
  scene.setAttribute('embedded', '');
  scene.setAttribute('vr-mode-ui', 'enabled: false');
  scene.setAttribute('device-orientation-permission-ui', 'enabled: false');
  // 화면에 보이지 않게 (감지 전용)
  scene.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:1;';

  const cam = document.createElement('a-camera');
  cam.setAttribute('position', '0 0 0');
  cam.setAttribute('look-controls', 'enabled: false');
  scene.appendChild(cam);

  const target = document.createElement('a-entity');
  target.setAttribute('mindar-image-target', 'targetIndex: 0');
  target.addEventListener('targetFound', () => setStatus(true));
  target.addEventListener('targetLost',  () => setStatus(false));
  // 감지용 더미 plane (렌더링 불필요)
  const plane = document.createElement('a-plane');
  plane.setAttribute('width', '0.1');
  plane.setAttribute('height', '0.1');
  plane.setAttribute('visible', 'false');
  target.appendChild(plane);
  scene.appendChild(target);

  document.body.appendChild(scene);
  arSceneEl = scene;

  // scene loaded 후 MindAR video를 꺼내 직접 표시
  scene.addEventListener('loaded', () => {
    // MindAR이 생성한 video 요소 찾기
    const mindVideo = scene.querySelector('video') || document.querySelector('#arScene video');
    const displayVideo = document.getElementById('arVideo');
    if (mindVideo && mindVideo.srcObject) {
      displayVideo.srcObject = mindVideo.srcObject;
    } else if (mindVideo) {
      // srcObject가 아직 없으면 스트림 대기
      mindVideo.addEventListener('loadedmetadata', () => {
        if (mindVideo.srcObject) displayVideo.srcObject = mindVideo.srcObject;
      }, { once: true });
    }
    displayVideo.classList.add('active');
  });

  // video srcObject를 polling으로 확인 (loaded 이전에 스트림이 올 수 있음)
  const pollVideo = setInterval(() => {
    const mindVideo = document.querySelector('#arScene video');
    const displayVideo = document.getElementById('arVideo');
    if (mindVideo && mindVideo.srcObject && !displayVideo.srcObject) {
      displayVideo.srcObject = mindVideo.srcObject;
      displayVideo.classList.add('active');
    }
    if (displayVideo.srcObject) clearInterval(pollVideo);
  }, 200);

  setTimeout(() => clearInterval(pollVideo), 15000);
}

function stopAR() {
  hideFlame2D();
  const scene = document.getElementById('arScene');
  if (scene) {
    const sys = scene.systems && scene.systems['mindar-image-system'];
    if (sys) try { sys.stop(); } catch(e) {}
    scene.remove();
  }
  const v = document.getElementById('arVideo');
  v.srcObject = null;
  v.classList.remove('active');
  document.getElementById('camOverlay').classList.remove('active');
}

function goHall() {
  stopAR();
  document.getElementById('hallScreen').classList.remove('hidden');
}
</script>
</body>
</html>
