<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>AR 불꽃 | WKF 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe-v1.4.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    :root {
      --bg:#ffffff; --surface:#f4f4f4; --border:#e8e8e8;
      --primary:#dc2626; --text:#111111; --text-2:#666666; --text-3:#aaaaaa; --r:16px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;font-family:-apple-system,sans-serif;color:var(--text);background:#000;}

    /* 로딩 화면 */
    #loadScreen{
      position:fixed;inset:0;z-index:50;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:20px;padding:40px;
    }
    #loadScreen.hidden{display:none;}
    .load-icon{font-size:52px;}
    .load-title{font-size:18px;font-weight:800;text-align:center;letter-spacing:-.02em;}
    .load-sub{font-size:13px;color:var(--text-2);text-align:center;line-height:1.7;}
    .load-bar-wrap{width:100%;max-width:260px;height:4px;background:var(--surface);border-radius:2px;overflow:hidden;}
    .load-bar{height:100%;background:var(--primary);border-radius:2px;transition:width .4s;width:0%;}
    .load-pct{font-size:12px;color:var(--text-3);}
    .load-err{font-size:13px;color:var(--primary);text-align:center;line-height:1.6;}
    .err-btn{
      padding:14px 32px;background:var(--primary);color:#fff;
      border-radius:var(--r);text-decoration:none;font-size:15px;font-weight:700;
    }

    /* MindAR video: body에 직접, 카메라 배경 */
    #arVideo{
      display:none;
      position:fixed;top:0;left:0;
      width:100vw;height:100vh;
      object-fit:cover;
      z-index:10;
    }

    /* 불꽃 2D canvas 오버레이 */
    #flameOverlay{
      display:none;
      position:fixed;inset:0;
      z-index:12;
      pointer-events:none;
    }
    #flameOverlay.active{display:block;}

    /* 카메라 UI 오버레이 */
    #camOverlay{
      position:fixed;inset:0;z-index:20;
      display:none;flex-direction:column;
      pointer-events:none;
    }
    #camOverlay.active{display:flex;}
    .cam-top{
      display:flex;align-items:center;justify-content:space-between;
      padding:max(env(safe-area-inset-top,0px),16px) 20px 16px;
      background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);
      pointer-events:all;
    }
    .cam-back{
      width:40px;height:40px;border-radius:12px;
      background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;color:#fff;text-decoration:none;
    }
    .hall-pill{
      padding:7px 16px;border-radius:20px;
      background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.2);
      font-size:13px;font-weight:700;color:#fff;
      opacity:0;transition:opacity .3s;min-width:80px;text-align:center;
    }
    .hall-pill.visible{opacity:1;}
    .cam-top-spacer{width:40px;}
    .cam-middle{flex:1;display:flex;align-items:center;justify-content:center;}
    .scan-hint{
      padding:10px 20px;border-radius:20px;
      background:rgba(0,0,0,.45);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.15);
      font-size:12px;color:rgba(255,255,255,.75);
      opacity:1;transition:opacity .3s;
    }
    .scan-hint.hidden{opacity:0;}
    .cam-bottom{
      padding:14px 20px;padding-bottom:max(env(safe-area-inset-bottom,0px),14px);
      display:flex;align-items:center;
      background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
      pointer-events:all;
    }
    .status-pill{
      display:flex;align-items:center;gap:8px;
      padding:10px 18px;border-radius:50px;
      background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.15);
      font-size:13px;font-weight:600;color:rgba(255,255,255,.85);
      transition:all .3s;
    }
    .status-pill.found{background:rgba(220,38,38,.75);border-color:rgba(255,100,100,.4);color:#fff;}
    .status-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);animation:blink 1.4s infinite;}
    .status-pill.found .status-dot{background:#fff;animation:none;}
    @keyframes blink{0%,100%{opacity:.3;}50%{opacity:1;}}

    /* A-Frame scene: 숨겨서 감지 전용으로만 사용 */
    #arScene{
      position:fixed !important;
      top:0 !important;left:0 !important;
      width:100vw !important;height:100vh !important;
      pointer-events:none !important;
      z-index:1 !important;
    }

    /* 인앱 경고 */
    #inappWarn{
      display:none;position:fixed;inset:0;z-index:999;background:var(--bg);
      flex-direction:column;align-items:center;justify-content:center;
      padding:40px 28px;text-align:center;gap:16px;
    }
    #inappWarn.on{display:flex;}
    .warn-icon{font-size:52px;}
    .warn-title{font-size:22px;font-weight:800;}
    .warn-desc{font-size:13px;color:var(--text-2);line-height:1.7;}
    #warnUrl{width:100%;max-width:320px;padding:14px 16px;border-radius:12px;background:var(--surface);font-size:12px;color:var(--text-2);word-break:break-all;line-height:1.5;text-align:left;}
    .warn-btn{width:100%;max-width:320px;padding:18px;border-radius:var(--r);border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}

    /* 디버그 패널 */
    #debugPanel{
      display:none;position:fixed;top:0;right:0;z-index:100;
      width:min(360px,85vw);max-height:100vh;overflow-y:auto;
      background:rgba(0,0,0,.88);backdrop-filter:blur(8px);
      color:#0f0;font-family:'Courier New',monospace;font-size:11px;
      padding:12px;line-height:1.5;
    }
    #debugPanel.on{display:block;}
    #debugPanel .db-title{color:#fff;font-size:13px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    #debugPanel .db-close{background:none;border:1px solid #555;color:#fff;border-radius:6px;padding:2px 10px;font-size:12px;cursor:pointer;}
    #debugPanel .db-section{margin:8px 0 4px;color:#0ff;font-weight:700;font-size:11px;border-bottom:1px solid #333;padding-bottom:2px;}
    #debugPanel .db-row{display:flex;justify-content:space-between;padding:1px 0;}
    #debugPanel .db-key{color:#aaa;}
    #debugPanel .db-val{color:#0f0;text-align:right;max-width:60%;word-break:break-all;}
    #debugPanel .db-val.err{color:#f44;}
    #debugPanel .db-val.warn{color:#fa0;}
    #debugPanel .db-val.ok{color:#0f0;}
    #debugLog{max-height:200px;overflow-y:auto;border:1px solid #333;padding:4px;margin-top:6px;font-size:10px;color:#ccc;}
    #debugLog div{border-bottom:1px solid #1a1a1a;padding:1px 0;}
    #debugLog .log-time{color:#666;margin-right:4px;}
    #debugLog .log-err{color:#f44;}
    #debugLog .log-warn{color:#fa0;}
    #debugLog .log-ok{color:#0f0;}
    #debugToggle{
      position:fixed;top:8px;right:8px;z-index:101;
      width:36px;height:36px;border-radius:50%;
      background:rgba(0,0,0,.6);border:1px solid #555;
      color:#0f0;font-size:16px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
  </style>
</head>
<body>

<!-- 로딩 화면 -->
<div id="loadScreen">
  <div class="load-icon">🔥</div>
  <div class="load-title">세션별 불꽃 준비 중</div>
  <div class="load-sub">5개 세션장 마커를 불러오고 있습니다.<br>잠시만 기다려주세요.</div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <div class="load-pct" id="loadPct">0%</div>
</div>

<!-- 카메라 영상 (MindAR video를 받아 표시) -->
<video id="arVideo" autoplay playsinline webkit-playsinline muted></video>

<!-- 불꽃 2D 오버레이 -->
<canvas id="flameOverlay"></canvas>

<!-- 카메라 UI 오버레이 -->
<div id="camOverlay">
  <div class="cam-top">
    <a href="index.html" class="cam-back">‹</a>
    <div class="hall-pill" id="pillName"></div>
    <div class="cam-top-spacer"></div>
  </div>
  <div class="cam-middle">
    <div class="scan-hint" id="scanHint">📍 횃불 마커를 화면 중앙에 비춰주세요</div>
  </div>
  <div class="cam-bottom">
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusTxt">마커를 찾는 중...</span>
    </div>
  </div>
</div>

<!-- 디버그 토글 & 패널 -->
<button id="debugToggle" onclick="toggleDebug()">🐛</button>
<div id="debugPanel">
  <div class="db-title">
    <span>🐛 AR Debug Panel</span>
    <button class="db-close" onclick="toggleDebug()">✕</button>
  </div>
  <div class="db-section">Environment</div>
  <div id="dbEnv"></div>
  <div class="db-section">MindAR / A-Frame</div>
  <div id="dbMindar"></div>
  <div class="db-section">Camera</div>
  <div id="dbCam"></div>
  <div class="db-section">Markers (.mind file)</div>
  <div id="dbMarkers"></div>
  <div class="db-section">Target Events</div>
  <div id="dbTargets"></div>
  <div class="db-section">Log</div>
  <div id="debugLog"></div>
</div>

<!-- 인앱 경고 -->
<div id="inappWarn">
  <div class="warn-icon">📵</div>
  <div class="warn-title">다른 브라우저로<br>열어주세요</div>
  <div class="warn-desc">카카오톡 인앱 브라우저에서는 카메라 권한이 제한됩니다.<br><br>아래 주소를 <strong>Chrome</strong> 또는 <strong>기본 브라우저</strong>에서 열어주세요.</div>
  <div id="warnUrl"></div>
  <button class="warn-btn" onclick="copyUrl()">🔗 주소 복사</button>
</div>

<script>
/* ── 세션장 데이터 (순서 = targetIndex 0~4) ── */
const HALLS_ARR = [
  { name:'다이너스티 A', en:'Dynasty Hall A', markerImg:'image/marker-1.png', flameKey:'gold' },
  { name:'다이너스티 B', en:'Dynasty Hall B', markerImg:'image/marker-2.png', flameKey:'purple' },
  { name:'루비',         en:'Ruby Hall',      markerImg:'image/marker-3.png', flameKey:'fire' },
  { name:'토파즈',       en:'Topaz Hall',     markerImg:'image/marker-4.png', flameKey:'blue' },
  { name:'에메랄드',     en:'Emerald Hall',   markerImg:'image/marker-5.png', flameKey:'green' },
];

const BAR_PARAMS = [
  {h:30,dur:1.1, del:0,    sy1:0.68,sy2:1.06},
  {h:50,dur:0.92,del:0.2,  sy1:0.75,sy2:1.00},
  {h:57,dur:1.28,del:0.08, sy1:0.62,sy2:0.96},
  {h:65,dur:0.98,del:0.04, sy1:0.70,sy2:1.05},
  {h:55,dur:1.18,del:0.25, sy1:0.65,sy2:0.97},
  {h:47,dur:0.85,del:0.14, sy1:0.80,sy2:1.10},
  {h:37,dur:1.05,del:0.31, sy1:0.72,sy2:1.02},
];
const FLAME_COLS = {
  fire:   ['#7f1d1d','#dc2626','#f97316','#fef08a'],
  gold:   ['#92400e','#d97706','#fbbf24','#fef9c3'],
  purple: ['#3b0764','#7c3aed','#a855f7','#e9d5ff'],
  blue:   ['#0c4a6e','#0284c7','#38bdf8','#e0f2fe'],
  green:  ['#14532d','#15803d','#16a34a','#dcfce7'],
};

function drawFlameFrame(ctx, W, H, stops, t) {
  ctx.clearRect(0, 0, W, H);
  const barW = W / BAR_PARAMS.length;
  const grad = ctx.createLinearGradient(0, H, 0, 0);
  stops.forEach((c, i) => grad.addColorStop(i / (stops.length - 1), c));
  BAR_PARAMS.forEach((p, i) => {
    const phase = ((t / 1000 - p.del) / p.dur) % 2;
    const t01 = phase < 1 ? phase : 2 - phase;
    const scale = p.sy1 + (p.sy2 - p.sy1) * t01;
    const bh = p.h * (H / 65) * scale;
    ctx.fillStyle = grad;
    ctx.fillRect(i * barW + 1, H - bh, barW - 2, bh);
  });
  const glow = ctx.createRadialGradient(W/2, H*.7, 0, W/2, H*.7, W*.55);
  glow.addColorStop(0, stops[Math.floor(stops.length/2)] + '88');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'source-over';
}

/* ── A-Frame 컴포넌트 (감지용, 렌더링은 별도) ── */
AFRAME.registerComponent('flame-canvas', {
  schema: { hallIdx: {type:'string', default:''} },
  init() {}, tick() {}
});

/* ── 상태 ── */
let flameRafId = null;
let arStarting = false;
let arPollId = null;
let arPollTimeoutId = null;

function isInApp() {
  return /KAKAOTALK|NAVER|Instagram|FB_IAB|FBAN|Line|FBAV/i.test(navigator.userAgent);
}
function copyUrl() {
  navigator.clipboard?.writeText(location.href)
    .then(() => alert('주소가 복사되었습니다!\nChrome 또는 기본 브라우저에 붙여넣기 해주세요.'))
    .catch(() => prompt('아래 주소를 복사하세요', location.href));
}

/* ── 로딩 진행률 ── */
function setLoadProgress(pct, label) {
  document.getElementById('loadBar').style.width = pct + '%';
  document.getElementById('loadPct').textContent = label || Math.round(pct) + '%';
}

/* ── 이미지 로드 헬퍼 ── */
function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('이미지 로드 실패: ' + src));
    img.src = src;
  });
}

/* ── 2D 불꽃 오버레이 ── */
function showFlame2D(flameKey) {
  const fc = document.getElementById('flameOverlay');
  fc.width = window.innerWidth;
  fc.height = window.innerHeight;
  fc.classList.add('active');

  const ctx = fc.getContext('2d');
  const stops = FLAME_COLS[flameKey] || FLAME_COLS.fire;

  const FW = Math.min(fc.width * 0.55, 280);
  const FH = FW * 1.2;
  const fx = (fc.width - FW) / 2;
  const fy = fc.height - FH - 80;

  const tmp = document.createElement('canvas');
  tmp.width = FW; tmp.height = FH;
  const tmpCtx = tmp.getContext('2d');

  cancelAnimationFrame(flameRafId);
  function animate() {
    ctx.clearRect(0, 0, fc.width, fc.height);
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(fx - 16, fy - 16, FW + 32, FH + 32, 20);
    ctx.fill();
    ctx.restore();
    drawFlameFrame(tmpCtx, FW, FH, stops, performance.now());
    ctx.drawImage(tmp, fx, fy, FW, FH);
    flameRafId = requestAnimationFrame(animate);
  }
  animate();
}

function hideFlame2D() {
  cancelAnimationFrame(flameRafId);
  flameRafId = null;
  document.getElementById('flameOverlay').classList.remove('active');
}

/* ── 상태 UI 업데이트 ── */
function setStatus(found, hallIdx) {
  const pill = document.getElementById('statusPill');
  const txt = document.getElementById('statusTxt');
  const hint = document.getElementById('scanHint');
  const namePill = document.getElementById('pillName');

  pill.classList.toggle('found', found);
  txt.textContent = found ? '🔥 불꽃 인식됨!' : '마커를 찾는 중...';
  hint.classList.toggle('hidden', found);

  if (found && hallIdx !== undefined) {
    const hall = HALLS_ARR[hallIdx];
    namePill.textContent = hall.name;
    namePill.classList.add('visible');
    showFlame2D(hall.flameKey);
  } else {
    namePill.classList.remove('visible');
    hideFlame2D();
  }
}

/* ── AR 시작 ── */
async function startAR(mindUrl) {
  if (arStarting) return;
  arStarting = true;

  const old = document.getElementById('arScene');
  if (old) old.remove();

  const scene = document.createElement('a-scene');
  scene.id = 'arScene';
  scene.setAttribute('mindar-image',
    `imageTargetSrc: ${mindUrl}; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 10000; warmupTolerance: 2; missTolerance: 8; maxTrack: 1`);
  scene.setAttribute('embedded', '');
  scene.setAttribute('vr-mode-ui', 'enabled: false');
  scene.setAttribute('device-orientation-permission-ui', 'enabled: false');
  scene.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:1;';

  const cam = document.createElement('a-camera');
  cam.setAttribute('position', '0 0 0');
  cam.setAttribute('look-controls', 'enabled: false');
  scene.appendChild(cam);

  HALLS_ARR.forEach((hall, idx) => {
    const target = document.createElement('a-entity');
    target.setAttribute('mindar-image-target', `targetIndex: ${idx}`);
    target.addEventListener('targetFound', () => setStatus(true, idx));
    target.addEventListener('targetLost',  () => setStatus(false));
    const plane = document.createElement('a-plane');
    plane.setAttribute('width', '0.1');
    plane.setAttribute('height', '0.1');
    plane.setAttribute('visible', 'false');
    target.appendChild(plane);
    scene.appendChild(target);
  });

  document.body.appendChild(scene);

  let transitioned = false;

  const showCamera = () => {
    if (transitioned) return;

    // scene 내부 또는 body에 직접 추가된 MindAR video 모두 탐색
    const mindVideo =
      scene.querySelector('video') ||
      [...document.querySelectorAll('body > video')]
        .find(v => v.id !== 'arVideo');

    if (!mindVideo) return false;

    transitioned = true;
    clearInterval(arPollId);
    clearTimeout(arPollTimeoutId);

    mindVideo.style.cssText = [
      'position:fixed!important', 'top:0!important', 'left:0!important',
      'width:100vw!important', 'height:100vh!important',
      'object-fit:cover!important', 'z-index:10!important'
    ].join(';');

    // flameOverlay 앞에 삽입
    const flameEl = document.getElementById('flameOverlay');
    if (flameEl && flameEl.parentNode === document.body) {
      document.body.insertBefore(mindVideo, flameEl);
    }

    // A-Frame canvas 숨기기
    document.querySelectorAll('#arScene canvas').forEach(c => {
      c.style.cssText = 'opacity:0!important;pointer-events:none!important;';
    });

    document.getElementById('loadScreen').classList.add('hidden');
    document.getElementById('camOverlay').classList.add('active');
    setStatus(false);
    arStarting = false;
    return true;
  };

  // scene loaded 이벤트
  scene.addEventListener('loaded', () => setTimeout(showCamera, 300));

  // 300ms 마다 폴링 (loaded 이벤트가 늦거나 안 올 때 대비)
  arPollId = setInterval(() => showCamera(), 300);

  // 20초 후 강제 전환 — 카메라는 켜졌지만 scene loaded가 안 된 경우
  arPollTimeoutId = setTimeout(() => {
    clearInterval(arPollId);
    if (!transitioned) {
      // video가 어디든 있으면 강제로 꺼내서 보여줌
      const anyVideo = [...document.querySelectorAll('video')]
        .find(v => v.id !== 'arVideo' && v.srcObject);
      if (anyVideo) {
        transitioned = true;
        anyVideo.style.cssText = [
          'position:fixed!important', 'top:0!important', 'left:0!important',
          'width:100vw!important', 'height:100vh!important',
          'object-fit:cover!important', 'z-index:10!important'
        ].join(';');
        document.getElementById('loadScreen').classList.add('hidden');
        document.getElementById('camOverlay').classList.add('active');
        setStatus(false);
      } else {
        // 카메라 자체를 못 열면 에러 표시
        document.getElementById('loadScreen').innerHTML = `
          <div class="load-icon">📵</div>
          <div class="load-title">카메라를 열 수 없습니다</div>
          <div class="load-err">카메라 권한을 허용하고 Chrome 브라우저에서 다시 시도하세요.</div>
          <a href="index.html" class="err-btn">← 메인으로 돌아가기</a>`;
      }
      arStarting = false;
    }
  }, 20000);
}

/* ── markers_all.mind 존재 여부 확인 ── */
async function checkPrecompiled() {
  try {
    const res = await fetch('markers_all.mind', { method: 'HEAD' });
    return res.ok;
  } catch(e) { return false; }
}

/* ── 런타임 컴파일 (fallback) ── */
async function compileMarkers() {
  const Compiler = window.MINDAR?.IMAGE?.Compiler;
  if (!Compiler) throw new Error('MindAR Compiler를 찾을 수 없습니다.');

  setLoadProgress(15, '마커 이미지 불러오는 중...');
  const images = await Promise.all(HALLS_ARR.map(h => loadImage(h.markerImg)));

  setLoadProgress(30, '마커 분석 중...');
  const compiler = new Compiler();

  // MindAR progress 콜백값은 0~1이 아닐 수 있으므로 clamp 처리
  let lastNorm = 0;
  await compiler.compileImageTargets(images, p => {
    const norm = (typeof p === 'number' && p >= 0 && p <= 1) ? p : Math.min(1, lastNorm + 0.04);
    lastNorm = norm;
    setLoadProgress(30 + norm * 60, '마커 분석 중...');
  });

  const buffer = await compiler.exportData();
  return URL.createObjectURL(new Blob([buffer]));
}

/* ── 초기화 ── */
async function init() {
  if (isInApp()) {
    document.getElementById('warnUrl').textContent = location.href;
    document.getElementById('inappWarn').classList.add('on');
    document.getElementById('loadScreen').classList.add('hidden');
    return;
  }

  try {
    setLoadProgress(5, '준비 중...');

    let mindUrl;
    const hasPrecompiled = await checkPrecompiled();

    if (hasPrecompiled) {
      setLoadProgress(60, '마커 파일 로드 중...');
      mindUrl = 'markers_all.mind';
      setLoadProgress(90, '카메라 시작 중...');
    } else {
      mindUrl = await compileMarkers();
      setLoadProgress(95, '카메라 시작 중...');
    }

    await startAR(mindUrl);

  } catch (err) {
    console.error('AR init error:', err);
    const ls = document.getElementById('loadScreen');
    ls.innerHTML = `
      <div class="load-icon">⚠️</div>
      <div class="load-title">준비 중 오류 발생</div>
      <div class="load-err">${err.message}</div>
      <a href="index.html" class="err-btn">← 메인으로 돌아가기</a>
    `;
  }
}

/* ── 디버그 시스템 ── */
const _dbLogs = [];
function dbLog(msg, level='info') {
  const t = new Date().toLocaleTimeString('ko',{hour12:false});
  _dbLogs.push({t, msg, level});
  if (_dbLogs.length > 200) _dbLogs.shift();
  const el = document.getElementById('debugLog');
  if (!el) return;
  const cls = level === 'err' ? 'log-err' : level === 'warn' ? 'log-warn' : level === 'ok' ? 'log-ok' : '';
  el.innerHTML += `<div><span class="log-time">${t}</span><span class="${cls}">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

function dbRow(key, val, cls='') {
  return `<div class="db-row"><span class="db-key">${key}</span><span class="db-val ${cls}">${val}</span></div>`;
}

function toggleDebug() {
  const p = document.getElementById('debugPanel');
  p.classList.toggle('on');
  if (p.classList.contains('on')) refreshDebugInfo();
}

function refreshDebugInfo() {
  // Environment
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/.test(ua);
  const isAndroid = /Android/.test(ua);
  const browser = /CriOS/.test(ua) ? 'Chrome(iOS)' : /Chrome/.test(ua) ? 'Chrome' : /Safari/.test(ua) ? 'Safari' : /Firefox/.test(ua) ? 'Firefox' : 'Other';
  const inApp = isInApp();
  document.getElementById('dbEnv').innerHTML =
    dbRow('Platform', isIOS ? 'iOS' : isAndroid ? 'Android' : 'Desktop') +
    dbRow('Browser', browser) +
    dbRow('InApp Browser', inApp ? 'YES ⚠️' : 'No', inApp ? 'err' : 'ok') +
    dbRow('Screen', `${screen.width}×${screen.height} @${devicePixelRatio}x`) +
    dbRow('Viewport', `${innerWidth}×${innerHeight}`) +
    dbRow('Protocol', location.protocol, location.protocol === 'https:' ? 'ok' : 'warn') +
    dbRow('WebGL', (() => { try { return !!document.createElement('canvas').getContext('webgl2') ? 'WebGL2 ✓' : !!document.createElement('canvas').getContext('webgl') ? 'WebGL1' : 'None ✗'; } catch(e) { return 'Error'; } })());

  // MindAR / A-Frame
  const scene = document.getElementById('arScene');
  const aframeVer = window.AFRAME ? AFRAME.version : 'NOT LOADED';
  const mindarLoaded = !!window.MINDAR?.IMAGE;
  const compilerAvail = !!window.MINDAR?.IMAGE?.Compiler;
  const sceneAttrs = scene ? scene.getAttribute('mindar-image') : 'N/A';
  document.getElementById('dbMindar').innerHTML =
    dbRow('A-Frame', aframeVer, aframeVer === 'NOT LOADED' ? 'err' : 'ok') +
    dbRow('MindAR loaded', mindarLoaded ? 'Yes ✓' : 'No ✗', mindarLoaded ? 'ok' : 'err') +
    dbRow('Compiler', compilerAvail ? 'Available' : 'N/A') +
    dbRow('Scene exists', scene ? 'Yes' : 'No', scene ? 'ok' : 'warn') +
    dbRow('Scene attrs', sceneAttrs ? `<div style="word-break:break-all;font-size:9px;max-width:200px">${sceneAttrs}</div>` : 'N/A');

  // Camera
  const videos = [...document.querySelectorAll('video')];
  let camInfo = '';
  videos.forEach((v,i) => {
    const stream = v.srcObject;
    const tracks = stream ? stream.getVideoTracks() : [];
    const settings = tracks[0] ? tracks[0].getSettings() : null;
    camInfo += dbRow(`Video[${i}] id`, v.id || '(no id)');
    camInfo += dbRow(`  srcObject`, stream ? 'MediaStream ✓' : 'null', stream ? 'ok' : 'err');
    camInfo += dbRow(`  readyState`, String(v.readyState), v.readyState >= 2 ? 'ok' : 'warn');
    camInfo += dbRow(`  videoSize`, `${v.videoWidth}×${v.videoHeight}`, v.videoWidth > 0 ? 'ok' : 'err');
    camInfo += dbRow(`  playing`, (!v.paused && !v.ended) ? 'Yes' : 'No', !v.paused ? 'ok' : 'err');
    if (settings) {
      camInfo += dbRow(`  resolution`, `${settings.width}×${settings.height}`);
      camInfo += dbRow(`  facingMode`, settings.facingMode || 'N/A');
      camInfo += dbRow(`  frameRate`, String(settings.frameRate || 'N/A'));
    }
    if (tracks[0]) {
      camInfo += dbRow(`  trackState`, tracks[0].readyState, tracks[0].readyState === 'live' ? 'ok' : 'err');
    }
  });
  if (!videos.length) camInfo = dbRow('Videos', 'None found', 'err');
  document.getElementById('dbCam').innerHTML = camInfo;

  // Markers / .mind file
  checkPrecompiled().then(has => {
    let markersInfo = dbRow('.mind precompiled', has ? 'markers_all.mind ✓' : 'Not found (runtime compile)', has ? 'ok' : 'warn');
    HALLS_ARR.forEach((h, i) => {
      const img = new Image();
      img.src = h.markerImg;
      markersInfo += dbRow(`Marker[${i}]`, `${h.name} → ${h.markerImg}`);
    });
    document.getElementById('dbMarkers').innerHTML = markersInfo;
  });

  // Target events
  const targets = scene ? scene.querySelectorAll('[mindar-image-target]') : [];
  let targetInfo = dbRow('Registered targets', String(targets.length), targets.length === 5 ? 'ok' : 'err');
  targets.forEach((t, i) => {
    const attr = t.getAttribute('mindar-image-target');
    targetInfo += dbRow(`Target[${i}]`, attr || 'N/A');
  });
  document.getElementById('dbTargets').innerHTML = targetInfo;
}

// Intercept console.error/warn for debug log
const _origErr = console.error;
const _origWarn = console.warn;
console.error = function() { dbLog([...arguments].join(' '), 'err'); _origErr.apply(console, arguments); };
console.warn = function() { dbLog([...arguments].join(' '), 'warn'); _origWarn.apply(console, arguments); };

// Auto-refresh debug panel every 2s
setInterval(() => {
  if (document.getElementById('debugPanel')?.classList.contains('on')) refreshDebugInfo();
}, 2000);

// Hook into startAR to log lifecycle
const _origStartAR = startAR;
startAR = async function(mindUrl) {
  dbLog(`startAR called, mindUrl=${mindUrl}`, 'info');
  dbLog(`markers_all.mind URL: ${mindUrl}`, 'info');

  const result = _origStartAR(mindUrl);

  // Monitor scene events
  setTimeout(() => {
    const scene = document.getElementById('arScene');
    if (scene) {
      dbLog('a-scene element created', 'ok');
      scene.addEventListener('loaded', () => dbLog('a-scene "loaded" event fired', 'ok'));
      scene.addEventListener('renderstart', () => dbLog('a-scene "renderstart" fired', 'ok'));

      scene.addEventListener('arReady', () => dbLog('MindAR "arReady" fired', 'ok'));
      scene.addEventListener('arError', (e) => dbLog(`MindAR "arError": ${e.detail?.error || e}`, 'err'));

      const targets = scene.querySelectorAll('[mindar-image-target]');
      targets.forEach((t, i) => {
        t.addEventListener('targetFound', () => dbLog(`✅ Target[${i}] "${HALLS_ARR[i]?.name}" FOUND`, 'ok'));
        t.addEventListener('targetLost',  () => dbLog(`❌ Target[${i}] "${HALLS_ARR[i]?.name}" LOST`, 'warn'));
      });
      dbLog(`${targets.length} target listeners attached`, 'info');
    } else {
      dbLog('a-scene NOT found after startAR', 'err');
    }
  }, 100);

  return result;
};

// Verify marker images on load
HALLS_ARR.forEach((h, i) => {
  const img = new Image();
  img.onload = () => dbLog(`Marker img[${i}] "${h.markerImg}" loaded (${img.naturalWidth}×${img.naturalHeight})`, 'ok');
  img.onerror = () => dbLog(`Marker img[${i}] "${h.markerImg}" FAILED to load`, 'err');
  img.src = h.markerImg;
});

// Check .mind file
fetch('markers_all.mind', {method:'HEAD'}).then(r => {
  if (r.ok) {
    dbLog(`markers_all.mind found (${r.headers.get('content-length') || '?'} bytes)`, 'ok');
    const ct = r.headers.get('content-type');
    if (ct) dbLog(`.mind content-type: ${ct}`, ct.includes('octet') || ct.includes('binary') ? 'ok' : 'warn');
  } else {
    dbLog(`markers_all.mind NOT found (${r.status}), will runtime compile`, 'warn');
  }
}).catch(e => dbLog(`markers_all.mind fetch error: ${e.message}`, 'err'));

dbLog('Debug system initialized', 'info');

init();
</script>
